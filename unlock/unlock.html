<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="unlock.css">
</head>
<body>
  <div class="container visible">
    <div class="title">
      <svg xmlns="http://www.w3.org/0000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
      </svg>
      Vault Locked
    </div>
    <form class="input-wrapper" id="unlock-form">
      <input type="password" id="password-input" placeholder="Master Password" autocomplete="off" autofocus>
      <button type="submit" id="unlock-btn">Unlock</button>
    </form>
    <div class="error" id="error-msg">Incorrect master password.</div>
  </div>
  <script src="unlock.js"></script>
</body>
</html>
